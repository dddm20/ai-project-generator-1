<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Builder</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>AI Builder</h1>

<div class="generator">
<h2>إنشاء مشروع جديد</h2>
<button onclick="generate('site')">موقع</button>
<button onclick="generate('app')">تطبيق</button>
<button onclick="generate('game')">لعبة</button>
</div>

<div id="genMessage"></div>

<script src="js/app.js"></script>
<script>
function generate(type){
  fetch("/generate/"+type)
  .then(r=>r.json())
  .then(data=>{
    const msgDiv=document.getElementById("genMessage");
    if(data.success){msgDiv.style.color="green";msgDiv.innerText=تم إنشاء مشروع ${data.type};}
    else{msgDiv.style.color="red";msgDiv.innerText="حدث خطأ";}
  });
}
</script>
</body>
</html>
