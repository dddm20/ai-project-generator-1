<h2>AI Project Builder</h2>

<input id="idea" placeholder="فكرة المشروع">

<button onclick="generate()">Generate</button>

<button onclick="download()">Download ZIP</button>

<iframe id="preview"></iframe>

<script>

let project={}

async function generate(){

let idea=document.getElementById("idea").value

let res=await fetch("/generate-project",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({idea:idea})

})

project=await res.json()

document.getElementById("preview").srcdoc=project["index.html"]

}

async function download(){

await fetch("/download-zip",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(project)

})

}

</script>
